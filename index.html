<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- Add expense — form: amount, category (dropdown: food/travel/hostel/misc), date, note -->
    <form>
      <label for="amount">Enter Amount in INR</label><br>
      <input type="number" name="amount" id="amount"><br><br>

      <label for="category"> Enter the Category of Expense</label><br><br>
      <div class="radioChoice" id="Choice">
        <div class="radio-item">
          <input type="radio" name="category" value="food" id="food">
          <label for="food">Food</label>
        </div>
        <div class="radio-item">
          <input type="radio" name="category" value="travel" id="travel">
          <label for="travel">Travel</label>
        </div>
        <div class="radio-item">
          <input type="radio" name="category" value="hostel" id="hostel">
          <label for="hostel">Hostel</label>
        </div>
        <div class="radio-item">
          <input type="radio" name="category" value="misc" id="misc">
          <label for="misc">Misc</label>
        </div>
      </div><br>
      <label for="date">Enter Date</label><br>
      <input type="date" name="date" id="date"><br><br>

      <label for="note">Write Any Note if you like</label><br>
      <input type="text" placeholder="note..." id="note"><br><br>

      <button type="submit" id="submit">submit</button>
    </form>
    <!-- Display List -->
    <table class="table">
    <tr id="tableRow">
    <th class="s_no">S.No.</th>
    <th class="amount">Amount</th>
    <th class="category">Category</th>
    <th class="date">Date</th>
    <th class="note">Note</th>
    </tr>
    </table>
     <script src="script.js"></script>
  </body>
</html>
